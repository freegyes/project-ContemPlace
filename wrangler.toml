name = "contemplace"
main = "src/index.ts"
compatibility_date = "2024-04-03"
compatibility_flags = ["nodejs_compat"]

[[services]]
binding = "CAPTURE_SERVICE"
service = "mcp-contemplace"
entrypoint = "CaptureService"

[[r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "contemplace-images"

[vars]
R2_PUBLIC_URL = "" # Set after enabling public access on the R2 bucket (e.g., "https://pub-<hash>.r2.dev")
